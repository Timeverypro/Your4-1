<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางธาตุบ้า ๆ - ทดสอบธาตุ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, 'Noto Sans Thai', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e2937);
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { color: #60a5fa; margin-bottom: 10px; }
        .subtitle { color: #94a3b8; margin-bottom: 30px; }
        .card {
            background: #1e2937;
            border-radius: 16px;
            padding: 40px 60px;
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
            border: 2px solid #334155;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .symbol {
            font-size: 120px;
            font-weight: bold;
            color: #60a5fa;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.5);
        }
        .name {
            font-size: 26px;
            font-weight: 600;
            color: #a5b4fc;
            margin: 20px 0;
            min-height: 70px;
            line-height: 1.3;
        }
        .hidden { opacity: 0; transition: opacity 0.4s ease; }
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-reveal { background: #22c55e; color: white; }
        .btn-reveal:hover { background: #16a34a; transform: scale(1.05); }
        .btn-speak { background: #ec4899; color: white; }
        .btn-speak:hover { background: #db2777; transform: scale(1.05); }
        .btn-next { background: #3b82f6; color: white; }
        .btn-next:hover { background: #2563eb; transform: scale(1.05); }
        .btn-random { background: #8b5cf6; color: white; }
        .btn-random:hover { background: #7c3aed; transform: scale(1.05); }
        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #334155;
            color: white;
            padding: 8px 16px;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 14px;
        }
        .stats { margin-top: 20px; color: #64748b; font-size: 14px; }
        .info {
            max-width: 500px;
            text-align: center;
            margin-top: 40px;
            color: #64748b;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <button class="lang-toggle" id="lang-btn">English</button>
    
    <h1 id="title">🧪 ตารางธาตุบ้า ๆ</h1>
    <p class="subtitle" id="subtitle">เดาสัญลักษณ์ธาตุ!</p>
    
    <div class="card" id="card">
        <div id="atomic-number" style="font-size: 18px; color: #64748b; margin-bottom: 10px;"></div>
        <div class="symbol" id="symbol">??</div>
        <div class="name" id="name"></div>
    </div>
    
    <div class="controls">
        <button class="btn-reveal" id="reveal-btn">เผยชื่อเต็ม</button>
        <button class="btn-speak" id="speak-btn" disabled>🔊 Speak</button>
        <button class="btn-next" id="next-btn">ธาตุถัดไป</button>
        <button class="btn-random" id="random-btn">สุ่มใหม่</button>
    </div>
    
    <div class="stats">
        <span id="score">คะแนน: 0 / 0</span> | 
        <span id="streak">สตรีค: 0</span>
    </div>
    
    <div class="info" id="info">
        กด <strong>เผยชื่อเต็ม</strong> → กด <strong>🔊 Speak</strong> เพื่อฟังเสียง<br>
        ใช้ <strong>ธาตุถัดไป</strong> หรือ <strong>สุ่มใหม่</strong>
    </div>

            { symbol: "Cf", name: "แคลิฟอร์เนียม", enName: "Californium", number: 98 },
            { symbol: "Es", name: "ไอน์สไตเนียม", enName: "Einsteinium", number: 99 },
            { symbol: "Fm", name: "เฟอร์เมียม", enName: "Fermium", number: 100 },
            { symbol: "Md", name: "เมนเดเลเวียม", enName: "Mendelevium", number: 101 },
            { symbol: "No", name: "โนเบเลียม", enName: "Nobelium", number: 102 },
            { symbol: "Lr", name: "ลอเรนเซียม", enName: "Lawrencium", number: 103 },
            { symbol: "Rf", name: "รัทเทอร์ฟอร์เดียม", enName: "Rutherfordium", number: 104 },
            { symbol: "Db", name: "ดูบเนียม", enName: "Dubnium", number: 105 },
            { symbol: "Sg", name: "ซีบอร์เกียม", enName: "Seaborgium", number: 106 },
            { symbol: "Bh", name: "โบห์เรียม", enName: "Bohrium", number: 107 },
            { symbol: "Hs", name: "แฮสเซียม", enName: "Hassium", number: 108 },
            { symbol: "Mt", name: "ไมต์เนเรียม", enName: "Meitnerium", number: 109 },
            { symbol: "Ds", name: "ดาร์มสตัดเทียม", enName: "Darmstadtium", number: 110 },
            { symbol: "Rg", name: "เรินต์เกเนียม", enName: "Roentgenium", number: 111 },
            { symbol: "Cn", name: "โคเปอร์นิเซียม", enName: "Copernicium", number: 112 },
            { symbol: "Nh", name: "นิโฮเนียม", enName: "Nihonium", number: 113 },
            { symbol: "Fl", name: "ฟลีโรเวียม", enName: "Flerovium", number: 114 },
            { symbol: "Mc", name: "มอสโกเวียม", enName: "Moscovium", number: 115 },
            { symbol: "Lv", name: "ลิเวอร์มอเรียม", enName: "Livermorium", number: 116 },
            { symbol: "Ts", name: "เทนเนสซีน", enName: "Tennessine", number: 117 },
            { symbol: "Og", name: "โอกาเนสซอน", enName: "Oganesson", number: 118 }
        ];

        let currentElement = null;
        let score = 0, total = 0, streak = 0, revealed = false;
        let isThai = true;

        const symbolEl = document.getElementById('symbol');
        const nameEl = document.getElementById('name');
        const numberEl = document.getElementById('atomic-number');
        const revealBtn = document.getElementById('reveal-btn');
        const speakBtn = document.getElementById('speak-btn');
        const nextBtn = document.getElementById('next-btn');
        const randomBtn = document.getElementById('random-btn');
        const langBtn = document.getElementById('lang-btn');
        const titleEl = document.getElementById('title');
        const subtitleEl = document.getElementById('subtitle');
        const infoEl = document.getElementById('info');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');

        function getRandomElement() {
            return elements[Math.floor(Math.random() * elements.length)];
        }

        function loadNewElement() {
            currentElement = getRandomElement();
            revealed = false;
            symbolEl.textContent = currentElement.symbol;
            nameEl.textContent = '';
            nameEl.classList.add('hidden');
            numberEl.textContent = isThai ? `เลขอะตอม: ${currentElement.number}` : `Atomic Number: ${currentElement.number}`;
            
            revealBtn.textContent = isThai ? 'เผยชื่อเต็ม' : 'Reveal Full Name';
            speakBtn.disabled = true;
        }

        function revealName() {
            if (!currentElement || revealed) return;
            nameEl.textContent = isThai ? currentElement.name : currentElement.enName;
            nameEl.classList.remove('hidden');
            revealed = true;
            score++; total++; streak++;
            updateStats();
            revealBtn.textContent = isThai ? 'เผยแล้ว ✓' : 'Revealed ✓';
            speakBtn.disabled = false;
        }

        function speakName() {
            if (!currentElement || !revealed) return;
            
            const utterance = new SpeechSynthesisUtterance(currentElement.enName);
            utterance.lang = 'en-US';
            utterance.rate = 0.95;
            utterance.pitch = 1.05;
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function updateStats() {
            scoreEl.textContent = isThai ? `คะแนน: ${score} / ${total}` : `Score: ${score} / ${total}`;
            streakEl.textContent = isThai ? `สตรีค: ${streak}` : `Streak: ${streak}`;
        }

        function toggleLanguage() {
            isThai = !isThai;
            langBtn.textContent = isThai ? 'English' : 'ภาษาไทย';
            
            titleEl.textContent = isThai ? '🧪 ตารางธาตุบ้า ๆ' : '🧪 Pidiotic Table';
            subtitleEl.textContent = isThai ? 'เดาสัญลักษณ์ธาตุ!' : 'Guess the element from its symbol!';
            
            infoEl.innerHTML = isThai ? 
                'กด <strong>เผยชื่อเต็ม</strong> → กด <strong>🔊 Speak</strong> เพื่อฟังเสียง<br>ใช้ <strong>ธาตุถัดไป</strong> หรือ <strong>สุ่มใหม่</strong>' :
                'Click <strong>Reveal</strong> → Click <strong>🔊 Speak</strong> to hear<br>Use <strong>Next</strong> or <strong>Random</strong>';
            
            revealBtn.textContent = isThai ? 'เผยชื่อเต็ม' : 'Reveal Full Name';
            nextBtn.textContent = isThai ? 'ธาตุถัดไป' : 'Next Element';
            randomBtn.textContent = isThai ? 'สุ่มใหม่' : 'Random More';
            speakBtn.textContent = '🔊 Speak';
            
            if (currentElement && revealed) {
                nameEl.textContent = isThai ? currentElement.name : currentElement.enName;
                numberEl.textContent = isThai ? `เลขอะตอม: ${currentElement.number}` : `Atomic Number: ${currentElement.number}`;
            }
            updateStats();
        }

        // Event Listeners
        revealBtn.addEventListener('click', revealName);
        speakBtn.addEventListener('click', speakName);
        nextBtn.addEventListener('click', () => { if(!revealed){total++; streak=0; updateStats();} loadNewElement(); });
        randomBtn.addEventListener('click', () => { if(!revealed){total++; streak=0; updateStats();} loadNewElement(); });
        langBtn.addEventListener('click', toggleLanguage);

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') revealed ? loadNewElement() : revealName();
            if (e.key.toLowerCase() === 'r') loadNewElement();
            if (e.key.toLowerCase() === 's' && revealed) speakName();
        });

        // Start
        loadNewElement();
        updateStats();
    </script>
</body>
</html>
